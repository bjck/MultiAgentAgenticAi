logging:
  level:
    com.bko.http.logging: WARN
    org.springframework.ai: WARN

spring:
  application:
    name: multiagent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/multiagent}
    username: ${SPRING_DATASOURCE_USERNAME:multiagent}
    password: ${SPRING_DATASOURCE_PASSWORD:multiagent}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
    openai:
      api-key: ${OPENAI_API_KEY:none}
      base-url: ${OPENAI_BASE_URL:https://api-cortex.t-netcompany.com}
      chat:
        options:
          model: ${OPENAI_MODEL:claude-4-sonnet}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: ${LIQUIBASE_ENABLED:false}

multiagent:
  max-tasks: 4
  worker-concurrency: 4
  # Worker task timeout (LLM + tool calls + possible retries). Increase if workers hit "request timed out" (e.g. 180s for arXiv/tool-heavy tasks).
  worker-timeout: 180s
  # How often (ms) to poll for scheduled agents that are due (default: 60000 = 1 minute)
  scheduled-agent-poll-interval: 60000
  role-execution-defaults:
    rounds: 1
    agents: 1
    collaboration-strategy: simple-summary
  role-execution:
    analysis:
      rounds: 2
      agents: 4
  workspace-root: ${WORKSPACE_ROOT:${user.dir}}
  ai-provider: ${AI_PROVIDER:GOOGLE}
  google:
    api-key: ${GOOGLE_API_KEY}
  openai:
    api-key: ${OPENAI_API_KEY:none}
    base-url: ${OPENAI_BASE_URL:https://api-cortex.t-netcompany.com/v1}
    model: ${OPENAI_MODEL:claude-4-sonnet}
  # Agent skills configuration - define specialized skills per agent type
  skills:
    # Skills for the orchestrator agent (planning phase)
    orchestrator: []
    # Skills for the synthesis agent (combining worker outputs)
    synthesis: []
    # Default skills applied to all worker agents
    worker-defaults: []
    # Role-specific skills for worker agents
    workers:
      analysis: []
      research: []
      design: []
      engineering: []
      implementer: []
      qa: []
      writing: []
      general: []
  skill-planning:
    default-skill-budget: 3


